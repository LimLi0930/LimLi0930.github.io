<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 工作台</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background: #343541;
    color: white;
}

.hidden { display: none; }

.app {
    display: flex;
    height: 100vh;
}

/* 登录页 */
.auth {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.auth-box {
    background: #202123;
    padding: 30px;
    border-radius: 10px;
    width: 300px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    background: #2a2b32;
    border: none;
    color: white;
}

button {
    padding: 10px;
    background: #4f46e5;
    border: none;
    color: white;
    width: 100%;
    cursor: pointer;
    border-radius: 6px;
}

/* 主界面 */
.sidebar {
    width: 240px;
    background: #202123;
    display: flex;
    flex-direction: column;
}

.sidebar div {
    padding: 12px;
    cursor: pointer;
}

.sidebar div:hover {
    background: #2a2b32;
}

.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.header {
    padding: 10px;
    border-bottom: 1px solid #444;
}

.page {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

/* 聊天 */
.chat-box {
    height: 70%;
    overflow-y: auto;
}

.message {
    margin: 10px 0;
}

.user { text-align: right; }
.bot { text-align: left; }

.bubble {
    display: inline-block;
    padding: 10px;
    border-radius: 10px;
    max-width: 60%;
}

.user .bubble { background: #4f46e5; }
.bot .bubble { background: #444654; }

.input-area {
    display: flex;
    margin-top: 10px;
}

textarea {
    flex: 1;
    background: #2a2b32;
    border: none;
    color: white;
    padding: 10px;
}
</style>
</head>

<body>

<!-- 登录页 -->


<!-- 主应用 -->
<div id="app" class="app hidden">

    <div class="sidebar">
        <div onclick="switchPage('chat')">💬 聊天</div>
        <div onclick="switchPage('profile')">🧠 人物画像</div>
        <div onclick="switchPage('project')">📂 专栏</div>
        <div onclick="switchPage('payment')">💰 充值</div>
        <div onclick="logout()">🚪 退出</div>
    </div>

    <div class="main">

        <div class="header">AI 工作台</div>

        <!-- 聊天 -->
        <div id="chat" class="page">
            <div class="chat-box" id="chatBox"></div>
            <div class="input-area">
                <textarea id="input"></textarea>
                <button onclick="send()">发送</button>
            </div>
        </div>

        <!-- 人物画像 -->
        <div id="profile" class="page hidden">
            <h2>人物画像</h2>
            <textarea placeholder="输入你的兴趣、习惯、目标"></textarea>
            <button>更新</button>
        </div>

        <!-- 专栏 -->
        <div id="project" class="page hidden">
            <h2>专项专栏</h2>
            <input placeholder="专栏名称">
            <button>创建</button>
        </div>

        <!-- 充值 -->
        <div id="payment" class="page hidden">
            <h2>充值</h2>
            <button>10 元</button>
            <button>50 元</button>
            <button>100 元</button>
        </div>

    </div>

</div>

<script>

// 登录
function login() {
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
}

// 注册
function register() {
    alert("注册成功（模拟）");
    showLogin();
}

// 切换页面
function switchPage(id) {
    document.querySelectorAll(".page").forEach(p => p.classList.add("hidden"));
    document.getElementById(id).classList.remove("hidden");
}

// 登录注册切换
function showRegister() {
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("registerPage").classList.remove("hidden");
}

function showLogin() {
    document.getElementById("registerPage").classList.add("hidden");
    document.getElementById("loginPage").classList.remove("hidden");
}

// 退出
function logout() {
    document.getElementById("app").classList.add("hidden");
    document.getElementById("loginPage").classList.remove("hidden");
}

// 聊天
function send() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    setTimeout(() => {
        addMessage("AI 回复：" + text, "bot");
    }, 500);
}

function addMessage(text, role) {
    const box = document.getElementById("chatBox");
    const div = document.createElement("div");
    div.className = "message " + role;
    div.innerHTML = `<div class="bubble">${text}</div>`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

</script>

</body>
</html>
