<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 工作台</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background: #343541;
    color: white;
}

/* 布局 */
.app {
    display: flex;
    height: 100vh;
}

/* 左侧栏 */
.sidebar {
    width: 260px;
    background: #202123;
    display: flex;
    flex-direction: column;
}

.sidebar-header {
    padding: 10px;
}

.new-chat {
    width: 100%;
    padding: 10px;
    border: 1px solid #555;
    background: transparent;
    color: white;
    border-radius: 6px;
}

.chat-list {
    flex: 1;
    overflow-y: auto;
}

.chat-item {
    padding: 10px;
    cursor: pointer;
}

.chat-item:hover {
    background: #2a2b32;
}

/* 主区域 */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* 顶部 */
.header {
    padding: 10px;
    border-bottom: 1px solid #444;
    display: flex;
    justify-content: space-between;
}

/* 聊天区域 */
.chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

/* 消息 */
.message {
    margin: 20px 0;
    display: flex;
}

.user {
    justify-content: flex-end;
}

.bot {
    justify-content: flex-start;
}

.bubble {
    max-width: 60%;
    padding: 12px;
    border-radius: 10px;
    line-height: 1.5;
}

.user .bubble {
    background: #4f46e5;
}

.bot .bubble {
    background: #444654;
}

/* 输入框 */
.input-area {
    padding: 15px;
    border-top: 1px solid #444;
    background: #40414f;
}

.input-box {
    display: flex;
    background: #343541;
    border-radius: 10px;
    padding: 10px;
}

textarea {
    flex: 1;
    background: transparent;
    border: none;
    color: white;
    resize: none;
    outline: none;
}

button {
    background: #4f46e5;
    border: none;
    color: white;
    padding: 10px 15px;
    border-radius: 6px;
    cursor: pointer;
}

/* 滚动条 */
::-webkit-scrollbar {
    width: 6px;
}
::-webkit-scrollbar-thumb {
    background: #555;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="app">

    <!-- 左侧 -->
    <div class="sidebar">
        <div class="sidebar-header">
            <button class="new-chat" onclick="newChat()">+ 新对话</button>
        </div>

        <div class="chat-list" id="chatList">
            <div class="chat-item">默认对话</div>
        </div>

        <div style="padding:10px; border-top:1px solid #333;">
            <div onclick="alert('人物画像功能')">🧠 人物画像</div>
            <div onclick="alert('专项专栏功能')">📂 专栏</div>
            <div onclick="alert('充值功能')">💰 充值</div>
        </div>
    </div>

    <!-- 主区域 -->
    <div class="main">

        <div class="header">
            <div>AI 助手</div>
            <div>
                <select>
                    <option>GPT-4</option>
                    <option>Gemini</option>
                </select>
            </div>
        </div>

        <div class="chat-container" id="chatContainer"></div>

        <div class="input-area">
            <div class="input-box">
                <textarea id="input" rows="1" placeholder="输入消息..."></textarea>
                <button onclick="send()">发送</button>
            </div>
        </div>

    </div>

</div>

<script>

function addMessage(text, role) {
    const container = document.getElementById("chatContainer");

    const msg = document.createElement("div");
    msg.className = "message " + role;

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerText = text;

    msg.appendChild(bubble);
    container.appendChild(msg);

    container.scrollTop = container.scrollHeight;
}

// 发送消息
function send() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");

    input.value = "";

    // 模拟 AI
    setTimeout(() => {
        addMessage("AI 回复：" + text, "bot");
    }, 500);

    // 👉 未来接 API
}

// 新对话
function newChat() {
    document.getElementById("chatContainer").innerHTML = "";
}

</script>

</body>
</html>
